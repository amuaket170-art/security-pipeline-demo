version: 0.2

phases:
  build:
    commands:
      - echo "Running security scan"
      - mkdir -p website
      - echo "<h1>My Deployed Site</h1>" > website/index.html
      - mkdir -p reports
      - echo "No vulnerabilities found" > reports/security-report.txt

artifacts:
  files:
    - website/index.html
    - reports/**/*
  discard-paths: yes